<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anonymous Board</title>

<style>
body{margin:0;background:#050505;color:#ddd;font-family:Arial}
header{background:#0d0d0d;padding:16px;display:flex;justify-content:space-between;border-bottom:1px solid #222;align-items:center}
.logo{font-weight:bold;color:#ccc}
#newsBanner{background:#111;border-bottom:1px solid #2a2a2a;padding:10px 16px;color:#aaa;font-size:13px}
.container{max-width:1400px;margin:auto;padding:20px}
.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
@media(max-width:1200px){.grid{grid-template-columns:repeat(3,1fr)}}
@media(max-width:800px){.grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:500px){.grid{grid-template-columns:repeat(1,1fr)}}
.thread{background:#111;border:1px solid #2a2a2a;border-radius:10px;cursor:pointer;overflow:hidden;transition:0.15s;min-height:120px}
.thread:hover{background:#151515;transform:scale(1.01)}
.thumb{width:100%;height:160px;object-fit:cover;background:#000;display:block}
.meta{font-size:12px;color:#888;padding:8px 10px 0}
.text{padding:8px 10px;font-size:14px}
.modal{display:none;position:fixed;inset:0;background:#000;overflow:auto}
.board{max-width:900px;margin:auto;padding:20px}
.post{background:#111;border:1px solid #2a2a2a;padding:14px;margin-bottom:10px;border-radius:10px}
.media{max-width:320px;margin-top:10px;border-radius:10px}
textarea,input{width:100%;background:#050505;border:1px solid #333;color:#ddd;padding:10px;margin-top:10px;border-radius:10px}
.file-btn{display:inline-block;margin-top:10px;padding:10px 14px;border:1px solid #333;border-radius:14px;background:#1a1a1a;cursor:pointer}
input[type=file]{display:none}
button{background:#1a1a1a;border:1px solid #333;color:#ddd;padding:10px 14px;border-radius:14px;cursor:pointer;margin-top:10px}
button:hover{background:#262626}
.small{font-size:12px;color:#888;margin-top:6px}
.error{color:#ff4d4d;font-size:13px;margin-top:8px}
</style>
</head>

<body>

<header>
<div class="logo">Anonymous Board</div>
</header>

<div id="newsBanner">Welcome to the board.</div>

<div class="container">
<h3>Threads</h3>
<div class="grid" id="threads"></div>
</div>

<div class="modal" id="viewModal">
<div class="board">

<button onclick="closeView()">Back</button>

<div id="threadView"></div>

<h3>Replies</h3>
<div id="replyBox"></div>

<textarea id="replyText" placeholder="Write a reply..."></textarea>

<label class="file-btn">
Attach Media
<input type="file" id="replyFile" accept="image/*,video/*" onchange="onFileSelect()">
</label>

<div id="fileStatus" class="small"></div>
<div id="errorBox" class="error"></div>

<button onclick="sendReply()" id="replyBtn">Reply</button>

</div>
</div>

<script>

let threads = []
let currentId = null

const threadsBox = document.getElementById("threads")
const modal = document.getElementById("viewModal")
const threadView = document.getElementById("threadView")
const replyBox = document.getElementById("replyBox")
const replyText = document.getElementById("replyText")
const replyFile = document.getElementById("replyFile")
const replyBtn = document.getElementById("replyBtn")
const fileStatus = document.getElementById("fileStatus")
const errorBox = document.getElementById("errorBox")

function esc(x){
return (x||"").replaceAll("&","&amp;").replaceAll("<","&lt;")
}

async function load(){
let r = await fetch("/threads")
let d = await r.json()
threads = Array.isArray(d) ? d : []
render()
}

function render(){
threadsBox.innerHTML=""

threads.forEach(t=>{
t.replies = t.replies || []

let div = document.createElement("div")
div.className="thread"

let media = ""
if(t.media){
media = t.media.includes("mp4")
? `<video class="thumb" muted src="${t.media}"></video>`
: `<img class="thumb" src="${t.media}">`
}

div.innerHTML = `
${media}
<div class="meta">Anonymous • ${new Date(t.time).toLocaleTimeString()}</div>
<div class="text">${esc(t.text)}</div>
<div class="meta">${t.replies.length} replies</div>
`

div.onclick = ()=>openThread(t.id)

threadsBox.appendChild(div)
})
}

function openThread(id){
currentId = id
let t = threads.find(x=>x.id===id)
if(!t) return

modal.style.display="block"

threadView.innerHTML = `
<div class="post">
<div class="meta">Anonymous • ${new Date(t.time).toLocaleTimeString()}</div>
<p>${esc(t.text)}</p>
${t.media ? (t.media.includes("mp4")
? `<video class="media" controls src="${t.media}"></video>`
: `<img class="media" src="${t.media}">`) : ""}
</div>
`

renderReplies()
}

function renderReplies(){
let t = threads.find(x=>x.id===currentId)
if(!t) return

replyBox.innerHTML=""

let list = [...(t.replies||[])].sort((a,b)=>new Date(b.time)-new Date(a.time))

list.forEach(r=>{
let div = document.createElement("div")
div.className="post"

div.innerHTML = `
<div class="meta">Anonymous • ${new Date(r.time).toLocaleTimeString()}</div>
<p>${esc(r.text)}</p>
${r.media ? (r.media.includes("mp4")
? `<video class="media" controls src="${r.media}"></video>`
: `<img class="media" src="${r.media}">`) : ""}
`

replyBox.appendChild(div)
})
}

function closeView(){
modal.style.display="none"
threadView.innerHTML=""
replyBox.innerHTML=""
replyText.value=""
replyFile.value=""
fileStatus.innerText=""
errorBox.innerText=""
currentId=null
}

async function sendReply(){
if(!currentId) return

errorBox.innerText=""
replyBtn.disabled=true
fileStatus.innerText="Uploading..."

let fd=new FormData()
fd.append("text",replyText.value||"")
if(replyFile.files[0]) fd.append("media",replyFile.files[0])

let r=await fetch(`/threads/${currentId}/reply`,{
method:"POST",
body:fd
})

let d=await r.json()

replyBtn.disabled=false

if(!r.ok){
errorBox.innerText=d.error||"error"
fileStatus.innerText=""
return
}

replyText.value=""
replyFile.value=""
fileStatus.innerText=""

await load()
renderReplies()
}

function onFileSelect(){
let f=replyFile.files[0]
fileStatus.innerText=f?("Ready: "+f.name):""
}

load()

</script>

</body>
</html>
