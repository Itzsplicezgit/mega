<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anonymous Board</title>

<style>
body{
margin:0;
background:#050505;
color:#ddd;
font-family:Arial;
}

header{
background:#0d0d0d;
padding:16px;
display:flex;
justify-content:space-between;
border-bottom:1px solid #222;
align-items:center;
}

.logo{font-weight:bold;color:#ccc}

#newsBanner{
background:#111;
border-bottom:1px solid #2a2a2a;
padding:10px 16px;
color:#aaa;
font-size:13px;
}

.container{
max-width:1400px;
margin:auto;
padding:20px;
}

.grid{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:12px;
}

@media(max-width:1200px){.grid{grid-template-columns:repeat(3,1fr)}}
@media(max-width:800px){.grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:500px){.grid{grid-template-columns:repeat(1,1fr)}}

.thread{
background:#111;
border:1px solid #2a2a2a;
border-radius:10px;
cursor:pointer;
overflow:hidden;
transition:0.15s;
min-height:120px;
}

.thread:hover{background:#151515;transform:scale(1.01)}

.thumb{
width:100%;
height:160px;
object-fit:cover;
background:#000;
display:block;
}

.meta{font-size:12px;color:#888;padding:8px 10px 0}

.text{padding:8px 10px;font-size:14px}

.modal{
display:none;
position:fixed;
inset:0;
background:#000;
overflow:auto;
}

.board{
max-width:900px;
margin:auto;
padding:20px;
}

.post{
background:#111;
border:1px solid #2a2a2a;
padding:14px;
margin-bottom:10px;
border-radius:10px;
}

.media{max-width:320px;margin-top:10px;border-radius:10px}

textarea,input{
width:100%;
background:#050505;
border:1px solid #333;
color:#ddd;
padding:10px;
margin-top:10px;
border-radius:10px;
}

.file-btn{
display:inline-block;
margin-top:10px;
padding:10px 14px;
border:1px solid #333;
border-radius:14px;
background:#1a1a1a;
cursor:pointer;
}

input[type=file]{display:none}

button{
background:#1a1a1a;
border:1px solid #333;
color:#ddd;
padding:10px 14px;
border-radius:14px;
cursor:pointer;
margin-top:10px;
}

button:hover{background:#262626}

.small{font-size:12px;color:#888;margin-top:6px}
.error{color:#ff4d4d;font-size:13px;margin-top:8px}

</style>
</head>

<body>

<header>
<div class="logo">Anonymous Board</div>
</header>

<div id="newsBanner">Welcome to the board.</div>

<div class="container">
<h3>Threads</h3>
<div class="grid" id="threads"></div>
</div>

<!-- MODAL -->
<div class="modal" id="viewModal">
<div class="board">

<button onclick="closeView()">Back</button>

<div id="threadView"></div>

<h3>Replies</h3>
<div id="replyBox"></div>

<textarea id="replyText" placeholder="Write a reply..."></textarea>

<label class="file-btn">
Attach Media
<input type="file" id="replyFile" accept="image/*,video/*" onchange="onFileSelect()">
</label>

<div id="fileStatus" class="small"></div>
<div id="errorBox" class="error"></div>

<button onclick="sendReply()" id="replyBtn">Reply</button>

</div>
</div>

<script>

let threads = []
let current = null

const threadsBox = document.getElementById("threads")
const modal = document.getElementById("viewModal")

/* =========================
   LOAD (lightweight)
========================= */

async function load(){
let res = await fetch("/threads")
threads = await res.json()
renderThreads()
}

/* =========================
   RENDER THREAD LIST (FAST)
========================= */

function renderThreads(){
threadsBox.innerHTML = ""

for(let i=0;i<threads.length;i++){
const t = threads[i]

let div = document.createElement("div")
div.className = "thread"

/* ONLY THUMBNAIL PREVIEW (no heavy DOM) */
let media = ""
if(t.media){
if(t.media.includes("mp4")){
media = `<video class="thumb" muted src="${t.media}"></video>`
}else{
media = `<img class="thumb" src="${t.media}">`
}
}

div.innerHTML = `
${media}
<div class="meta">Anonymous • ${new Date(t.time).toLocaleTimeString()}</div>
<div class="text">${escape(t.text)}</div>
<div class="meta">${t.replies.length} replies</div>
`

div.onclick = ()=>openThread(t.id)

threadsBox.appendChild(div)
}
}

/* =========================
   OPEN THREAD (lazy load)
========================= */

async function openThread(id){
const t = threads.find(x => x.id === id)
if(!t) return

current = t

modal.style.display = "block"

threadView.innerHTML = `
<div class="post">
<div class="meta">Anonymous • ${new Date(t.time).toLocaleTimeString()}</div>
<p>${escape(t.text)}</p>
${t.media ? (t.media.includes("mp4")
? `<video class="media" controls src="${t.media}"></video>`
: `<img class="media" src="${t.media}">`) : ""}
</div>
`

renderReplies()
}

/* =========================
   CLOSE (FULL UNLOAD)
========================= */

function closeView(){
modal.style.display = "none"

/* FULL UNLOAD (important for lag fix) */
threadView.innerHTML = ""
replyBox.innerHTML = ""

replyText.value = ""
replyFile.value = ""
fileStatus.innerText = ""
showError("")

current = null
}

/* =========================
   REPLIES (only for current)
========================= */

function renderReplies(){
if(!current) return

let box = document.getElementById("replyBox")
box.innerHTML = ""

let sorted = [...current.replies].sort((a,b)=>new Date(b.time)-new Date(a.time))

for(let r of sorted){
let div = document.createElement("div")
div.className = "post"

div.innerHTML = `
<div class="meta">Anonymous • ${new Date(r.time).toLocaleTimeString()}</div>
<p>${escape(r.text)}</p>
${r.media ? (r.media.includes("mp4")
? `<video class="media" controls src="${r.media}"></video>`
: `<img class="media" src="${r.media}">`) : ""}
`

box.appendChild(div)
}
}

/* =========================
   REPLY SEND
========================= */

async function sendReply(){
showError("")

if(!current) return

let file = replyFile.files[0]

if(!file){
showError("File required")
return
}

replyBtn.disabled = true
fileStatus.innerText = "Uploading..."

let fd = new FormData()
fd.append("text", replyText.value)
fd.append("media", file)

try{
let res = await fetch(`/threads/${current.id}/reply`,{
method:"POST",
body:fd
})

let data = await res.json()

replyBtn.disabled = false

if(!res.ok){
showError(data.error || "error")
fileStatus.innerText = ""
return
}

/* IMPORTANT: update local thread only */
current.replies.push({
text: replyText.value,
media: URL.createObjectURL(file),
time: new Date().toISOString()
})

replyText.value = ""
replyFile.value = ""
fileStatus.innerText = ""

renderReplies()

}catch(e){
replyBtn.disabled = false
showError("network error")
}
}

/* =========================
   HELPERS
========================= */

function onFileSelect(){
let f = replyFile.files[0]
fileStatus.innerText = f ? ("Ready: " + f.name) : ""
}

function showError(msg){
errorBox.innerText = msg || ""
}

function escape(x){
return x ? x.replaceAll("&","&amp;").replaceAll("<","&lt;") : ""
}

load()

</script>

</body>
</html>
