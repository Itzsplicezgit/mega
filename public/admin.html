<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel</title>

<style>
body{margin:0;background:#050505;color:#ddd;font-family:Arial}
header{padding:16px;background:#0d0d0d;border-bottom:1px solid #222;display:flex;justify-content:space-between;align-items:center}
h1{font-size:18px;color:#ccc}
button{background:#1a1a1a;border:1px solid #333;color:#ddd;padding:10px 12px;border-radius:12px;cursor:pointer;margin:4px}
button:hover{background:#262626}
.container{max-width:1000px;margin:auto;padding:20px}
textarea,input{width:100%;padding:10px;margin-top:10px;background:#050505;border:1px solid #333;color:#ddd;border-radius:10px}
.thread{background:#111;border:1px solid #2a2a2a;padding:12px;margin-bottom:10px;border-radius:10px}
.meta{font-size:12px;color:#888}
.actions{margin-top:10px;display:flex;flex-wrap:wrap;gap:6px}
.hidden{display:none}
.file-btn{display:inline-block;margin-top:10px;padding:10px 14px;border:1px solid #333;border-radius:12px;background:#1a1a1a;cursor:pointer}
input[type=file]{display:none}
.small{font-size:12px;color:#888;margin-top:6px}
.error{color:#ff4d4d;font-size:13px;margin-top:8px}
</style>
</head>

<body>

<header>
<h1>Admin Panel</h1>
<button onclick="logout()">Logout</button>
</header>

<div class="container">

<div id="loginBox">
<h2>Login</h2>
<input type="password" id="pass" placeholder="password">
<button onclick="login()">Login</button>
</div>

<div id="panel" class="hidden">

<h2>Create Thread</h2>

<textarea id="newText"></textarea>

<label class="file-btn">
Attach Media
<input type="file" id="newFile" accept="image/*,video/*" onchange="showFileName()">
</label>

<div id="fileStatus" class="small"></div>
<div id="errorBox" class="error"></div>

<button onclick="createThread()">Post Thread</button>
<button onclick="load()">Refresh</button>

<div id="threads"></div>

</div>

</div>

<script>

let token=localStorage.getItem("adminToken")

function showError(msg){
document.getElementById("errorBox").innerText=msg||""
}

async function login(){
let res=await fetch("/admin/login",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({password:pass.value})
})

let data=await res.json()

if(data.token){
token=data.token
localStorage.setItem("adminToken",token)
loginBox.classList.add("hidden")
panel.classList.remove("hidden")
load()
}else{
alert("failed")
}
}

function logout(){
localStorage.removeItem("adminToken")
location.reload()
}

async function load(){
let res=await fetch("/admin/threads",{headers:{"x-admin-token":token}})
if(res.status===403){alert("not logged in");return}
let data=await res.json()
render(data)
}

function render(data){
threads.innerHTML=""
data.forEach(t=>{
let div=document.createElement("div")
div.className="thread"

let media=""
if(t.media){
if(t.media.includes("mp4")){
media=`<video src="${t.media}" style="max-width:200px;margin-top:10px"></video>`
}else{
media=`<img src="${t.media}" style="max-width:200px;margin-top:10px">`
}
}

div.innerHTML=`
<div class="meta">ID: ${t.id}<br>Anonymous • ${new Date(t.time).toLocaleTimeString()}</div>
<p>${escape(t.text)}</p>
${media}
<div class="actions">
<button onclick="del('${t.id}')">Delete</button>
<button onclick="pin('${t.id}')">Pin Top</button>
<button onclick="bottom('${t.id}')">Move Bottom</button>
</div>
`

threads.appendChild(div)
})
}

async function createThread(){
showError("")

let fd=new FormData()
fd.append("text",newText.value)

let file=newFile.files[0]
if(file)fd.append("media",file)

try{
let res=await fetch("/admin/thread",{
method:"POST",
headers:{"x-admin-token":token},
body:fd
})

let data=await res.json()

if(!res.ok){
showError(data.error || "failed to post")
return
}

newText.value=""
newFile.value=""
document.getElementById("fileStatus").innerText=""
load()

}catch(e){
showError("network error")
}
}

function showFileName(){
let file=newFile.files[0]
if(file){
document.getElementById("fileStatus").innerText="Ready: "+file.name
}else{
document.getElementById("fileStatus").innerText=""
}
}

async function del(id){
await fetch(`/admin/thread/${id}`,{
method:"DELETE",
headers:{"x-admin-token":token}
})
load()
}

async function pin(id){
await fetch(`/admin/thread/${id}/pin`,{
method:"POST",
headers:{"x-admin-token":token}
})
load()
}

async function bottom(id){
await fetch(`/admin/thread/${id}/bottom`,{
method:"POST",
headers:{"x-admin-token":token}
})
load()
}

function escape(x){
return x?x.replaceAll("&","&amp;").replaceAll("<","&lt;"):""
}

if(token){
loginBox.classList.add("hidden")
panel.classList.remove("hidden")
load()
}

</script>

</body>
</html>
