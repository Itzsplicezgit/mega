<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Admin Panel</title>

<style>
body{
margin:0;
background:#050505;
color:#ddd;
font-family:Arial;
}

header{
padding:14px;
background:#0d0d0d;
border-bottom:1px solid #222;
display:flex;
justify-content:space-between;
}

.container{
display:flex;
height:100vh;
}

.left{
width:35%;
border-right:1px solid #222;
overflow:auto;
}

.right{
flex:1;
padding:10px;
overflow:auto;
}

.thread{
padding:10px;
border-bottom:1px solid #222;
cursor:pointer;
}

.thread:hover{background:#111}

.badge{
color:#ffcc00;
font-size:12px;
}

.reply{
background:#111;
padding:8px;
margin:6px 0;
border-radius:6px;
border:1px solid #222;
}

button{
background:#1a1a1a;
border:1px solid #333;
color:#ddd;
padding:6px 10px;
margin:4px;
cursor:pointer;
}

button:hover{background:#222}

img,video{max-width:250px;margin-top:6px}
</style>
</head>

<body>

<header>
<div>Admin</div>
<button onclick="logout()">Logout</button>
</header>

<div class="container">

<div class="left" id="list"></div>

<div class="right" id="view">
<h3>Select a thread</h3>
</div>

</div>

<script>

let token = localStorage.getItem("adminToken")
let current = null

/* =========================
   LOAD THREAD LIST
========================= */

async function load(){
let res = await fetch("/admin/threads",{headers:{"x-admin-token":token}})
let data = await res.json()

list.innerHTML=""

data.forEach(t=>{
let div = document.createElement("div")
div.className="thread"

div.innerHTML = `
<strong>${t.text.slice(0,40)}</strong><br>
<span class="badge">pending: ${t.pendingCount} | replies: ${t.replyCount}</span>
`

div.onclick = ()=>openThread(t.id)

list.appendChild(div)
})
}

/* =========================
   OPEN THREAD (lazy load)
========================= */

async function openThread(id){
let res = await fetch(`/admin/thread/${id}`,{
headers:{"x-admin-token":token}
})

current = await res.json()
renderThread()
}

/* =========================
   RENDER THREAD
========================= */

function renderThread(){
let t = current

let media = ""
if(t.media){
media = t.media.includes("mp4")
? `<video controls src="${t.media}"></video>`
: `<img src="${t.media}">`
}

view.innerHTML = `
<h3>Thread</h3>
<p>${t.text}</p>
${media}

<button onclick="delThread('${t.id}')">Delete</button>

<hr>

<h3>Pending</h3>
<div id="pending"></div>

<h3>Approved</h3>
<div id="approved"></div>
`

let p = document.getElementById("pending")
t.pendingReplies.forEach(r=>{
p.innerHTML += `
<div class="reply">
${r.text}<br>
${renderMedia(r.media)}
<br>
<button onclick="approve('${t.id}','${r.id}')">Approve</button>
<button onclick="reject('${t.id}','${r.id}')">Reject</button>
</div>
`
})

let a = document.getElementById("approved")
t.replies.forEach(r=>{
a.innerHTML += `
<div class="reply">
${r.text}<br>
${renderMedia(r.media)}
</div>
`
})
}

function renderMedia(m){
if(!m) return ""
if(m.includes("mp4")) return `<video controls src="${m}"></video>`
return `<img src="${m}">`
}

/* =========================
   ACTIONS
========================= */

async function approve(tid,rid){
await fetch(`/admin/thread/${tid}/reply/${rid}/approve`,{
method:"POST",
headers:{"x-admin-token":token}
})
openThread(tid)
load()
}

async function reject(tid,rid){
await fetch(`/admin/thread/${tid}/reply/${rid}`,{
method:"DELETE",
headers:{"x-admin-token":token}
})
openThread(tid)
load()
}

async function delThread(id){
await fetch(`/admin/thread/${id}`,{
method:"DELETE",
headers:{"x-admin-token":token}
})
view.innerHTML="deleted"
load()
}

/* =========================
   AUTH
========================= */

function logout(){
localStorage.removeItem("adminToken")
location.reload()
}

if(token) load()

</script>

</body>
</html>
