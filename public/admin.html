<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel</title>

<style>
body{
margin:0;
background:#050505;
color:#ddd;
font-family:Arial;
}

header{
padding:16px;
background:#0d0d0d;
border-bottom:1px solid #222;
display:flex;
justify-content:space-between;
align-items:center;
}

h1{font-size:18px;color:#ccc}

button{
background:#1a1a1a;
border:1px solid #333;
color:#ddd;
padding:10px 12px;
border-radius:12px;
cursor:pointer;
margin:4px;
}

button:hover{background:#262626}

.container{
max-width:1000px;
margin:auto;
padding:20px;
}

textarea,input{
width:100%;
padding:10px;
margin-top:10px;
background:#050505;
border:1px solid #333;
color:#ddd;
border-radius:10px;
}

.thread{
background:#111;
border:1px solid #2a2a2a;
padding:12px;
margin-bottom:10px;
border-radius:10px;
}

.meta{
font-size:12px;
color:#888;
}

.actions{
margin-top:10px;
display:flex;
flex-wrap:wrap;
gap:6px;
}

.replyBox{
margin-top:10px;
padding:10px;
border-top:1px solid #222;
}

.reply{
background:#0d0d0d;
border:1px solid #222;
padding:8px;
margin-top:6px;
border-radius:8px;
font-size:13px;
}

.hidden{display:none}

img,video{
max-width:250px;
margin-top:8px;
border-radius:8px;
}

.small{font-size:12px;color:#888;margin-top:6px}
.error{color:#ff4d4d;font-size:13px;margin-top:8px}
</style>
</head>

<body>

<header>
<h1>Admin Panel</h1>
<button onclick="logout()">Logout</button>
</header>

<div class="container">

<div id="loginBox">
<h2>Login</h2>
<input type="password" id="pass" placeholder="password">
<button onclick="login()">Login</button>
</div>

<div id="panel" class="hidden">

<h2>Create Thread</h2>

<textarea id="newText"></textarea>

<label class="file-btn">
Attach Media
<input type="file" id="newFile" accept="image/*,video/*">
</label>

<div id="fileStatus" class="small"></div>
<div id="errorBox" class="error"></div>

<button onclick="createThread()">Post Thread</button>
<button onclick="load()">Refresh</button>

<div id="threads"></div>

</div>

</div>

<script>

let token = localStorage.getItem("adminToken")

const loginBox = document.getElementById("loginBox")
const panel = document.getElementById("panel")
const threadsBox = document.getElementById("threads")

const pass = document.getElementById("pass")
const newText = document.getElementById("newText")
const newFile = document.getElementById("newFile")
const fileStatus = document.getElementById("fileStatus")
const errorBox = document.getElementById("errorBox")

/* STORE OPEN THREADS (NEW) */
let openReplies = {}

function showError(msg){
errorBox.innerText = msg || ""
}

/* =========================
   LOGIN
========================= */
async function login(){
let res = await fetch("/admin/login",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({password:pass.value})
})

let data = await res.json()

if(data.token){
token = data.token
localStorage.setItem("adminToken",token)
loginBox.classList.add("hidden")
panel.classList.remove("hidden")
load()
}else{
alert("login failed")
}
}

function logout(){
localStorage.removeItem("adminToken")
location.reload()
}

/* =========================
   LOAD
========================= */
async function load(){
let res = await fetch("/admin/threads",{headers:{"x-admin-token":token}})
let data = await res.json()
render(data)
}

/* =========================
   TOGGLE REPLIES (NEW CORE FIX)
========================= */
async function toggleReplies(threadId){

if(openReplies[threadId]){
delete openReplies[threadId]
render(await fetchData())
return
}

openReplies[threadId] = true
render(await fetchData())
}

async function fetchData(){
let res = await fetch("/admin/threads",{headers:{"x-admin-token":token}})
return await res.json()
}

/* =========================
   RENDER (NOW LAZY)
========================= */
function render(data){
threadsBox.innerHTML=""

data.forEach(t=>{

let div = document.createElement("div")
div.className="thread"

let media=""
if(t.media){
media = t.media.includes("mp4")
? `<video controls src="${t.media}"></video>`
: `<img src="${t.media}">`
}

let isOpen = openReplies[t.id]

div.innerHTML = `
<div class="meta">
ID: ${t.id}<br>
Anonymous • ${new Date(t.time).toLocaleTimeString()}
</div>

<p>${escape(t.text)}</p>
${media}

<div class="actions">
<button onclick="del('${t.id}')">Delete Thread</button>
<button onclick="pin('${t.id}')">Pin Top</button>
<button onclick="bottom('${t.id}')">Move Bottom</button>

<button onclick="toggleReplies('${t.id}')">
${isOpen ? "Collapse" : "Expand"} Replies
(${t.pendingReplies.length + t.replies.length})
</button>
</div>

<div id="box-${t.id}" class="${isOpen ? '' : 'hidden'} replyBox"></div>
`

threadsBox.appendChild(div)

if(isOpen){
renderReplies(t)
}
})
}

/* =========================
   RENDER REPLIES ONLY WHEN OPEN
========================= */
function renderReplies(t){

let box = document.getElementById("box-" + t.id)
if(!box) return

box.innerHTML = ""

let html = `<strong style="color:#ffcc00">Pending</strong>`

for(let r of t.pendingReplies){
html += `
<div class="reply">
${escape(r.text)}
<small>${new Date(r.time).toLocaleString()}</small>

${media(r.media)}

<button onclick="approveReply('${t.id}','${r.id}')">Approve</button>
<button onclick="delReply('${t.id}','${r.id}')">Reject</button>
</div>
`
}

html += `<strong>Approved</strong>`

for(let r of t.replies){
html += `
<div class="reply">
${escape(r.text)}
<small>${new Date(r.time).toLocaleString()}</small>

${media(r.media)}

<button onclick="delReply('${t.id}','${r.id}')">Delete</button>
</div>
`
}

box.innerHTML = html
}

/* =========================
   MEDIA HELPER
========================= */
function media(m){
if(!m) return ""
return m.includes("mp4")
? `<video controls src="${m}"></video>`
: `<img src="${m}">`
}

/* =========================
   ACTIONS
========================= */
async function del(id){
await fetch(`/admin/thread/${id}`,{method:"DELETE",headers:{"x-admin-token":token}})
load()
}

async function pin(id){
await fetch(`/admin/thread/${id}/pin`,{method:"POST",headers:{"x-admin-token":token}})
load()
}

async function bottom(id){
await fetch(`/admin/thread/${id}/bottom`,{method:"POST",headers:{"x-admin-token":token}})
load()
}

async function approveReply(tid,rid){
await fetch(`/admin/thread/${tid}/reply/${rid}/approve`,{method:"POST",headers:{"x-admin-token":token}})
load()
}

async function delReply(tid,rid){
await fetch(`/admin/thread/${tid}/reply/${rid}`,{method:"DELETE",headers:{"x-admin-token":token}})
load()
}

/* HELPERS */
function escape(x){
return x ? x.replaceAll("&","&amp;").replaceAll("<","&lt;") : ""
}

/* AUTO LOGIN */
if(token){
loginBox.classList.add("hidden")
panel.classList.remove("hidden")
load()
}

</script>

</body>
</html>
